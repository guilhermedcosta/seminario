<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: white; margin: 0; }
    

    .grid {
      display: grid;
      height: 90vh;
      gap: 10px;
      padding: 10px;
      background: #111;
      

      grid-template-areas: 
        "topo topo"
        "lado meio"
        "base base";

      grid-template-columns: 1fr 2fr;
      grid-template-rows: 80px 1fr 80px;
    }


    .r { grid-area: topo; background: #ff4757; }
    .a { grid-area: lado; background: #1e90ff; }
    .v { grid-area: meio; background: #2ed573; }
    .l { grid-area: base; background: #ffa502; }

    .grid div { border-radius: 10px; }
  </style>
</head>
<body>

  <div class="grid">
    <div class="r"></div>
    <div class="a"></div>
    <div class="v"></div>
    <div class="l"></div>
  </div>

</body>
</html>
