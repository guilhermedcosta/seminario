<!DOCTYPE html>
<html>
<head>
  <style>
    .predio {
      display: grid;
      height: 400px; 
      background: #111;
      gap: 10px;
      padding: 10px;


      grid-template-rows: 60px 1fr 50px;
    }


    .topo  { background: #ff4757; } 
    .meio  { background: #2ed573; } 
    .base  { background: #ffa502; }

    .predio div { border-radius: 8px; }
  </style>
</head>
<body>

  <div class="predio">
    <div class="topo"></div>
    <div class="meio"></div>
    <div class="base"></div>
  </div>

</body>
</html>
