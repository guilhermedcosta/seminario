<!DOCTYPE html>
<html>
<head>
  <style>

    .painel {
      display: grid;

      grid-template-columns: 80px 1fr 150px;
      gap: 15px;
      padding: 20px;
      background: #1a1a1a
    }


    .bloco-um   { background: #ff4757; height: 400px; border-radius: 10px; }
    .bloco-dois { background: #1e90ff; height: 400px; border-radius: 10px; }
    .bloco-tres { background: #2ed573; height: 400px; border-radius: 10px; }
  </style>
</head>
<body>

  <div class="painel">
    <div class="bloco-um"></div>
    <div class="bloco-dois"></div>
    <div class="bloco-tres"></div>
  </div>

</body>
</html>
